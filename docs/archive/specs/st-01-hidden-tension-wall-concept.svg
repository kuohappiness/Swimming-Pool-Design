<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">ST-01 垂直弦幕與隱藏式集力梁概念</title>
  <desc id="desc">樓梯側向概念圖。兩段同向鋼梯使用全高垂直弦幕；鋼線上端藏入 L2 樓板邊梁、樓梯開口上方或獨立梯廊橫框，不出現與樓梯平行的外露上框梁。圖面同時標示雙箱型梯梁、封閉踢面、雙高度扶手及玻璃備案。</desc>
  <defs>
    <pattern id="wire-pattern" width="14" height="14" patternUnits="userSpaceOnUse">
      <line x1="7" y1="0" x2="7" y2="14" stroke="#7e929a" stroke-width="1.25" opacity="0.82"/>
    </pattern>
    <clipPath id="lower-wire-clip">
      <polygon points="160,320 620,320 620,540 540,540 160,720"/>
    </clipPath>
    <clipPath id="upper-wire-clip">
      <polygon points="620,110 1120,110 1120,360 1060,360 680,540 620,540"/>
    </clipPath>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#b27722"/>
    </marker>
    <marker id="dim-start" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M8 0 L0 4 L8 8" fill="none" stroke="#607482" stroke-width="1.4"/>
    </marker>
    <marker id="dim-end" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8" fill="none" stroke="#607482" stroke-width="1.4"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, "Noto Sans TC", sans-serif; fill: #153449; }
    .title { font-size: 32px; font-weight: 750; letter-spacing: 0.02em; }
    .subtitle { font-size: 16px; fill: #607482; }
    .section { font-size: 18px; font-weight: 700; }
    .label { font-size: 15px; font-weight: 650; }
    .note { font-size: 13px; fill: #607482; }
    .small { font-size: 11.5px; fill: #607482; }
    .concrete { fill: #d8d3c9; stroke: #7d7b77; stroke-width: 1.5; }
    .concrete-light { fill: #e7e2d8; stroke: #a5a097; stroke-width: 1.2; }
    .shadow-slot { fill: #263d49; }
    .hidden-beam { fill: #bd8a22; fill-opacity: 0.16; stroke: #bd8a22; stroke-width: 2.2; stroke-dasharray: 8 6; }
    .steel { fill: none; stroke: #153449; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
    .steel-secondary { fill: none; stroke: #3f5965; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    .stair-step { fill: none; stroke: #153449; stroke-width: 2.7; stroke-linejoin: miter; }
    .tread-fill { fill: #eee9df; stroke: none; }
    .handrail { fill: none; stroke: #9d4e44; stroke-width: 4; stroke-linecap: round; }
    .cable-field { fill: url(#wire-pattern); }
    .anchor { fill: #bd8a22; stroke: #f7f3e9; stroke-width: 1.2; }
    .leader { fill: none; stroke: #b27722; stroke-width: 1.8; marker-end: url(#arrow); }
    .dimension { fill: none; stroke: #607482; stroke-width: 1.4; marker-start: url(#dim-start); marker-end: url(#dim-end); }
    .guide { fill: none; stroke: #9eabb0; stroke-width: 1.2; stroke-dasharray: 6 5; }
    .panel { fill: #f1ede4; stroke: #d0c9bc; stroke-width: 1.2; }
    .chip { fill: #153449; }
    .chip-text { fill: #f7f3e9; font-size: 12px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
    .glass { fill: #bcdfe2; fill-opacity: 0.42; stroke: #28879a; stroke-width: 2.2; }
  </style>

  <rect width="1440" height="900" fill="#f7f3e9"/>
  <text x="54" y="58" class="title">ST-01｜垂直弦幕與隱藏式集力梁</text>
  <text x="54" y="88" class="subtitle">B 主案概念 · 不由玻璃屋頂承載 · 避免新增平行外露上框梁</text>
  <line x1="54" y1="108" x2="1386" y2="108" stroke="#c8c0b3" stroke-width="1.2"/>

  <!-- Existing architectural bands used to conceal the collector beam. -->
  <rect x="120" y="270" width="520" height="58" rx="2" class="concrete-light"/>
  <rect x="145" y="286" width="470" height="26" rx="3" class="hidden-beam"/>
  <rect x="120" y="320" width="520" height="8" class="shadow-slot"/>
  <text x="140" y="257" class="note">L2 樓板邊梁／乾式梯廊既有橫框</text>

  <rect x="600" y="60" width="570" height="58" rx="2" class="concrete"/>
  <rect x="625" y="76" width="520" height="26" rx="3" class="hidden-beam"/>
  <rect x="600" y="110" width="570" height="8" class="shadow-slot"/>
  <text x="620" y="46" class="note">L2 樓梯開口上方／二樓天花結構帶</text>

  <!-- Cable fields vanish into the shadow slots; no visible sloped top frame. -->
  <rect x="150" y="110" width="1000" height="620" class="cable-field" clip-path="url(#lower-wire-clip)"/>
  <rect x="150" y="80" width="1000" height="660" class="cable-field" clip-path="url(#upper-wire-clip)"/>

  <!-- Stair treads, 15 risers / 14 treads per flight. -->
  <path d="M160 720 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.18 v-12" class="stair-step"/>
  <line x1="540" y1="540" x2="680" y2="540" class="stair-step"/>
  <path d="M680 540 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.14 v-12 h27.18 v-12" class="stair-step"/>
  <line x1="1060" y1="360" x2="1190" y2="360" class="stair-step"/>

  <!-- Twin closed box stringers shown as two close shadow lines in elevation. -->
  <path d="M160 728 L540 548 L680 548 L1060 368 L1190 368" class="steel"/>
  <path d="M160 741 L540 561 L680 561 L1060 381 L1190 381" class="steel-secondary" opacity="0.72"/>

  <!-- Independent adult and child handrails. -->
  <path d="M170 654 L545 477 L675 477 L1050 300 L1175 300" class="handrail"/>
  <path d="M170 675 L545 498 L675 498 L1050 321 L1175 321" class="handrail" opacity="0.72"/>

  <!-- Bottom anchors. -->
  <g>
    <circle cx="188" cy="715" r="4.5" class="anchor"/><circle cx="258" cy="682" r="4.5" class="anchor"/>
    <circle cx="328" cy="649" r="4.5" class="anchor"/><circle cx="398" cy="616" r="4.5" class="anchor"/>
    <circle cx="468" cy="582" r="4.5" class="anchor"/><circle cx="538" cy="549" r="4.5" class="anchor"/>
    <circle cx="706" cy="528" r="4.5" class="anchor"/><circle cx="776" cy="495" r="4.5" class="anchor"/>
    <circle cx="846" cy="462" r="4.5" class="anchor"/><circle cx="916" cy="429" r="4.5" class="anchor"/>
    <circle cx="986" cy="395" r="4.5" class="anchor"/><circle cx="1056" cy="362" r="4.5" class="anchor"/>
  </g>

  <!-- Context and dimensions. -->
  <line x1="90" y1="742" x2="1215" y2="742" stroke="#153449" stroke-width="3"/>
  <rect x="1060" y="344" width="155" height="16" class="concrete"/>
  <text x="1080" y="337" class="label">L2 +4.500 m</text>
  <line x1="128" y1="720" x2="128" y2="528" class="dimension"/>
  <text x="116" y="628" class="label" text-anchor="end">最低 2.4 m</text>
  <text x="116" y="648" class="small" text-anchor="end">實際延伸至隱藏集力梁</text>

  <line x1="160" y1="787" x2="540" y2="787" class="dimension"/>
  <line x1="540" y1="787" x2="680" y2="787" class="dimension"/>
  <line x1="680" y1="787" x2="1060" y2="787" class="dimension"/>
  <text x="350" y="811" class="note" text-anchor="middle">第一跑 4.20 m · 15 級高／14 踏面</text>
  <text x="610" y="811" class="note" text-anchor="middle">平台 1.80 m</text>
  <text x="870" y="811" class="note" text-anchor="middle">第二跑 4.20 m · 15 級高／14 踏面</text>

  <!-- Callouts. -->
  <path d="M410 238 C430 210 450 200 485 200" class="leader"/>
  <rect x="250" y="168" width="245" height="64" rx="8" class="panel"/>
  <text x="268" y="193" class="label">隱藏式集力梁</text>
  <text x="268" y="214" class="note">藏入既有結構帶與陰影縫，正常視角不見平行上框梁</text>

  <path d="M890 181 C930 170 960 155 982 118" class="leader"/>
  <rect x="760" y="170" width="260" height="63" rx="8" class="panel"/>
  <text x="778" y="195" class="label">垂直細線弦幕</text>
  <text x="778" y="216" class="note">概念間距約 40 mm；受力後有效開口仍須小於 100 mm</text>

  <path d="M905 575 C900 540 880 500 850 466" class="leader"/>
  <rect x="785" y="577" width="275" height="65" rx="8" class="panel"/>
  <text x="803" y="602" class="label">扶手與弦幕分工</text>
  <text x="803" y="623" class="note">雙高度扶手固定於梯梁；弦幕只作防墜，不承擔扶手推力</text>

  <path d="M395 720 C410 690 430 650 468 586" class="leader"/>
  <rect x="185" y="628" width="225" height="62" rx="8" class="panel"/>
  <text x="203" y="653" class="label">可檢查的下端錨具</text>
  <text x="203" y="674" class="note">逐條可調、可拆換，不把積水導入箱型梯梁</text>

  <!-- Right comparison panel. -->
  <rect x="1225" y="145" width="170" height="525" rx="14" class="panel"/>
  <text x="1250" y="182" class="section">主案與退場條件</text>
  <rect x="1250" y="204" width="54" height="26" rx="13" class="chip"/>
  <text x="1277" y="217" class="chip-text">B 主案</text>
  <text x="1250" y="254" class="label">2.4 m 全高弦幕</text>
  <text x="1250" y="278" class="note">• 垂直細線</text>
  <text x="1250" y="300" class="note">• 隱藏集力梁</text>
  <text x="1250" y="322" class="note">• 不連接玻璃屋頂</text>
  <text x="1250" y="344" class="note">• 實尺寸樣段驗證</text>

  <line x1="1250" y1="371" x2="1370" y2="371" stroke="#c8c0b3" stroke-width="1"/>
  <rect x="1250" y="394" width="54" height="26" rx="13" fill="#28879a"/>
  <text x="1277" y="407" class="chip-text">A 備案</text>
  <polygon points="1253,450 1366,428 1366,547 1253,569" class="glass"/>
  <line x1="1253" y1="569" x2="1366" y2="547" stroke="#153449" stroke-width="6"/>
  <text x="1250" y="595" class="label">1.35 m 夾層玻璃</text>
  <text x="1250" y="618" class="note">當材料、腐蝕、撓度或</text>
  <text x="1250" y="638" class="note">隱藏節點未通過時回退</text>

  <rect x="54" y="842" width="1332" height="36" rx="6" fill="#e9e4da"/>
  <text x="70" y="865" class="note">概念圖，不按比例。梁深、鋼線材質／預張力、頭部淨高、樓板開口、含氯腐蝕、推擠撓度與固定節點均須於實作前由建築／結構／材料專業驗證。</text>
</svg>
