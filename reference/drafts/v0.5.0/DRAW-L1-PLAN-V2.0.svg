<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">1F 概念平面圖 V2.0 專業重繪</title>
  <desc id="desc">依使用者手繪 V2.0 及已確認修訂整理的 1F 概念平面。圖面表達 33 公尺泳池主體、8 公尺機能翼、8 乘 7 公尺戶外區、7 公尺廁所帶、2 公尺退縮與長邊玻璃牆旁的樓梯候選位置。非施工圖。</desc>
  <defs>
    <linearGradient id="water" x1="0" x2="1">
      <stop offset="0" stop-color="#d8f3fb"/>
      <stop offset="1" stop-color="#8fd5ea"/>
    </linearGradient>
    <pattern id="deck" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="18" stroke="#d8e0e6" stroke-width="2"/>
    </pattern>
    <pattern id="outdoor" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 20L20 0M-5 5L5-5M15 25L25 15" stroke="#b9d8c8" stroke-width="1.5"/>
    </pattern>
    <pattern id="steps" width="9.6" height="48" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="48" stroke="#b77620" stroke-width="1.4"/>
    </pattern>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#263746"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#237c64"/>
    </marker>
    <style>
      text { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #203241; }
      .title { font-size: 40px; font-weight: 800; letter-spacing: 1px; }
      .subtitle { font-size: 18px; fill: #5d7080; }
      .zone { font-size: 25px; font-weight: 750; }
      .label { font-size: 18px; font-weight: 650; }
      .small { font-size: 15px; fill: #5d7080; }
      .tiny { font-size: 13px; fill: #677987; }
      .confirmedText { fill: #237c64; }
      .workingText { fill: #a66715; }
      .deferredText { fill: #b45555; }
      .wall { fill: none; stroke: #263746; stroke-width: 5; stroke-linejoin: round; }
      .partition { fill: none; stroke: #526572; stroke-width: 3; }
      .glass { fill: none; stroke: #2b9fb8; stroke-width: 7; stroke-linecap: round; }
      .deferred { fill: none; stroke: #c86666; stroke-width: 3; stroke-dasharray: 12 8; }
      .working { fill: none; stroke: #c58228; stroke-width: 3; stroke-dasharray: 10 7; }
      .dim { fill: none; stroke: #263746; stroke-width: 1.6; marker-start: url(#arrowEnd); marker-end: url(#arrowEnd); }
      .ext { stroke: #82919c; stroke-width: 1.2; }
      .dimText { font-size: 17px; font-weight: 750; text-anchor: middle; }
      .noteBox { fill: #fffdf8; stroke: #d8cdb6; stroke-width: 1.5; rx: 12; }
      .titleBox { fill: #f7fafb; stroke: #263746; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1800" height="1120" fill="#ffffff"/>
  <rect x="42" y="38" width="1716" height="1044" rx="18" fill="#fbfcfd" stroke="#d8e0e6" stroke-width="2"/>

  <text x="98" y="105" class="title">1F 概念平面圖</text>
  <text x="100" y="141" class="subtitle">V2.0 專業重繪 · v0.5.0 工作草案 · 單位：m · 非施工圖</text>
  <g transform="translate(1465 76)">
    <circle cx="0" cy="0" r="29" fill="#eef4f6" stroke="#5b7180" stroke-width="2"/>
    <path d="M12 18L-13-19M-13-19L-11-5M-13-19L0-14" fill="none" stroke="#263746" stroke-width="3" stroke-linecap="round"/>
    <text x="-24" y="-27" text-anchor="middle" class="label">N</text>
    <text x="45" y="-2" class="small">長軸 NW–SE：約 307°／127°</text>
    <text x="45" y="19" class="tiny">本圖右向約東南 127°</text>
  </g>

  <!-- Dimensions above plan -->
  <line x1="214" y1="230" x2="214" y2="260" class="ext"/>
  <line x1="1270" y1="230" x2="1270" y2="260" class="ext"/>
  <line x1="1526" y1="230" x2="1526" y2="260" class="ext"/>
  <line x1="214" y1="214" x2="1270" y2="214" class="dim"/>
  <line x1="1270" y1="214" x2="1526" y2="214" class="dim"/>
  <text x="742" y="202" class="dimText confirmedText">33.0 泳池主體</text>
  <text x="1398" y="202" class="dimText confirmedText">8.0 機能翼</text>
  <line x1="214" y1="170" x2="1526" y2="170" class="dim"/>
  <text x="870" y="158" class="dimText">41.0 總長（推導）</text>

  <!-- Site boundary and setback -->
  <line x1="150" y1="250" x2="150" y2="718" stroke="#8a98a2" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="137" y="484" transform="rotate(-90 137 484)" text-anchor="middle" class="small">原基地邊界工作線</text>
  <rect x="150" y="260" width="64" height="448" fill="#eef5ef" stroke="none"/>
  <path d="M171 284v388" stroke="#5b9b79" stroke-width="2" stroke-dasharray="5 6"/>
  <text x="182" y="470" transform="rotate(-90 182 470)" text-anchor="middle" class="label confirmedText">2.0 退縮</text>
  <text x="202" y="470" transform="rotate(-90 202 470)" text-anchor="middle" class="tiny">雨簾／回收介面</text>

  <!-- Main building envelope -->
  <rect x="214" y="260" width="1056" height="448" fill="url(#deck)"/>
  <rect x="1270" y="260" width="256" height="448" fill="#f8f6f0"/>
  <rect x="214" y="260" width="1312" height="448" class="wall"/>
  <line x1="1270" y1="260" x2="1270" y2="708" class="wall"/>

  <!-- Long-side glazing -->
  <line x1="250" y1="260" x2="1234" y2="260" class="glass"/>
  <line x1="250" y1="708" x2="1234" y2="708" class="glass"/>
  <text x="742" y="285" text-anchor="middle" class="small" fill="#2b9fb8">長邊玻璃牆</text>
  <text x="742" y="696" text-anchor="middle" class="small" fill="#2b9fb8">長邊玻璃牆／乾式樓梯廊側</text>

  <!-- Pool opening -->
  <rect x="414" y="364" width="656" height="240" rx="7" fill="url(#water)" stroke="#167ca2" stroke-width="4"/>
  <line x1="414" y1="444" x2="1070" y2="444" stroke="#ffffff" stroke-width="3" opacity=".9"/>
  <line x1="414" y1="524" x2="1070" y2="524" stroke="#ffffff" stroke-width="3" opacity=".9"/>
  <line x1="742" y1="379" x2="742" y2="589" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 8" opacity=".8"/>
  <text x="742" y="470" text-anchor="middle" class="zone" fill="#0d6589">POOL-01 · 三水道</text>
  <text x="742" y="501" text-anchor="middle" class="label" fill="#0d6589">20.5 × 7.5（0.4.0 工作池體，v0.5.0 定位待 OPEN-016）</text>
  <line x1="466" y1="564" x2="1018" y2="564" stroke="#237c64" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="466" y="588" class="small confirmedText">1.2 淺端（左）</text>
  <text x="1018" y="588" text-anchor="end" class="small confirmedText">1.5 深端（右）</text>
  <text x="300" y="336" class="zone">泳池大廳／池畔</text>

  <!-- Stair working envelope -->
  <g aria-label="ST-01 樓梯工作草案">
    <rect x="780" y="638" width="134.4" height="48" fill="url(#steps)" stroke="#b77620" stroke-width="2" stroke-dasharray="7 5"/>
    <rect x="914.4" y="638" width="57.6" height="48" fill="#f4dfbd" stroke="#b77620" stroke-width="2" stroke-dasharray="7 5"/>
    <rect x="972" y="638" width="134.4" height="48" fill="url(#steps)" stroke="#b77620" stroke-width="2" stroke-dasharray="7 5"/>
    <path d="M801 662H1086" fill="none" stroke="#a66715" stroke-width="3" marker-end="url(#arrowEnd)"/>
    <text x="943" y="627" text-anchor="middle" class="label workingText">ST-01 · 與玻璃牆平行向上</text>
    <text x="943" y="728" text-anchor="middle" class="small workingText">1.50 有效淨寬候選 · 平台 1.80 建議 · 總長 10.20 · 縱向落點待 OPEN-017</text>
  </g>

  <!-- Entrance at setback end, diagrammatic -->
  <path d="M250 708v-34a34 34 0 0 1 34 34" fill="none" stroke="#263746" stroke-width="3"/>
  <line x1="250" y1="708" x2="284" y2="674" stroke="#263746" stroke-width="3"/>
  <rect x="238" y="708" width="60" height="17" fill="#e6ebee" stroke="#526572" stroke-width="2"/>
  <line x1="244" y1="714" x2="292" y2="714" stroke="#9ba8b0"/>
  <line x1="244" y1="720" x2="292" y2="720" stroke="#9ba8b0"/>
  <text x="305" y="744" class="small deferredText">L1 入口／台階位置待 OPEN-008</text>

  <!-- Right wing: dry passage, toilets and outdoor zone -->
  <rect x="1270" y="260" width="256" height="52" fill="#dff2f4" stroke="#2b9fb8" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="1398" y="291" text-anchor="middle" class="small" fill="#167c91">泳池側乾式走道（寬度待定）</text>
  <rect x="1270" y="312" width="128" height="172" fill="#f8eef1"/>
  <rect x="1398" y="312" width="128" height="172" fill="#eef3f7"/>
  <line x1="1398" y1="312" x2="1398" y2="484" class="partition"/>
  <line x1="1270" y1="484" x2="1526" y2="484" class="wall"/>
  <rect x="1270" y="484" width="256" height="224" fill="url(#outdoor)"/>
  <text x="1334" y="393" text-anchor="middle" class="zone">女廁</text>
  <text x="1462" y="393" text-anchor="middle" class="zone">男廁</text>
  <text x="1398" y="430" text-anchor="middle" class="small workingText">隔間／器具配置待 OPEN-008</text>
  <text x="1398" y="585" text-anchor="middle" class="zone confirmedText">戶外區</text>
  <text x="1398" y="618" text-anchor="middle" class="label confirmedText">8.0 × 7.0</text>
  <text x="1398" y="648" text-anchor="middle" class="small">不與泳池大廳銜接</text>
  <!-- Rear/pool-side doors -->
  <path d="M1310 312v29a29 29 0 0 0 29-29M1438 312v29a29 29 0 0 0 29-29" fill="none" stroke="#263746" stroke-width="2.5"/>
  <!-- Outdoor doors -->
  <path d="M1310 484v-29a29 29 0 0 1 29 29M1438 484v-29a29 29 0 0 1 29 29" fill="none" stroke="#263746" stroke-width="2.5"/>
  <text x="1398" y="690" text-anchor="middle" class="tiny">兩廁各一泳池側開口＋一操場側開口</text>

  <!-- Vertical dimensions -->
  <line x1="1526" y1="260" x2="1567" y2="260" class="ext"/>
  <line x1="1526" y1="484" x2="1567" y2="484" class="ext"/>
  <line x1="1526" y1="708" x2="1567" y2="708" class="ext"/>
  <line x1="1550" y1="260" x2="1550" y2="484" class="dim"/>
  <line x1="1550" y1="484" x2="1550" y2="708" class="dim"/>
  <text x="1575" y="376" class="dimText confirmedText">7.0</text>
  <text x="1575" y="600" class="dimText confirmedText">7.0</text>
  <text x="1612" y="484" transform="rotate(-90 1612 484)" text-anchor="middle" class="small deferredText">14.0 推導／總寬待 OPEN-016</text>
  <line x1="150" y1="760" x2="214" y2="760" class="dim"/>
  <text x="182" y="786" class="dimText confirmedText">2.0</text>

  <!-- Notes and legend -->
  <rect x="100" y="818" width="1070" height="110" class="noteBox"/>
  <text x="126" y="848" class="label">圖面解讀</text>
  <circle cx="138" cy="878" r="7" fill="#237c64"/><text x="154" y="884" class="small">綠：使用者已確認的目標修訂</text>
  <circle cx="450" cy="878" r="7" fill="#c58228"/><text x="466" y="884" class="small">琥珀：工作建議／尺寸待定</text>
  <circle cx="792" cy="878" r="7" fill="#c86666"/><text x="808" y="884" class="small">紅虛線：跨層或法規仍待確認</text>
  <text x="126" y="911" class="small">戶外區、廁所帶、退縮與淺深方向為已確認意圖；廁所分隔、主入口、樓梯縱向落點、L2／屋頂對位不是本圖定案。</text>

  <!-- Title block -->
  <g transform="translate(100 954)">
    <rect width="1600" height="96" class="titleBox"/>
    <line x1="980" y1="0" x2="980" y2="96" stroke="#263746" stroke-width="1.5"/>
    <line x1="1240" y1="0" x2="1240" y2="96" stroke="#263746" stroke-width="1.5"/>
    <line x1="1430" y1="0" x2="1430" y2="96" stroke="#263746" stroke-width="1.5"/>
    <text x="20" y="31" class="label">國立臺中教育大學附設實驗國民小學游泳池翻修</text>
    <text x="20" y="65" class="zone">1F 概念平面圖 · V2.0</text>
    <text x="1000" y="31" class="small">圖號</text><text x="1000" y="64" class="label">DRAW-L1-PLAN</text>
    <text x="1260" y="31" class="small">圖面版本</text><text x="1260" y="64" class="label">V2.0</text>
    <text x="1450" y="31" class="small">專案目標</text><text x="1450" y="64" class="label">v0.5.0 DRAFT</text>
    <text x="20" y="88" class="tiny">來源：SRC-CONCEPT-010／011 · 建築、結構、消防、無障礙與機電仍需專業審查</text>
  </g>
</svg>
