  <text x="1310" y="370" text-anchor="middle" class="zone">女廁</text><text x="1438" y="370" text-anchor="middle" class="zone">男廁</text>
  <text x="1374" y="565" text-anchor="middle" class="zone confirmed">戶外區</text><text x="1374" y="592" text-anchor="middle" class="label confirmed">8.0 × 7.0</text><text x="1374" y="617" text-anchor="middle" class="small">不與泳池大廳銜接</text>
