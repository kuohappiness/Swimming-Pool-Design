  <rect x="1265" y="360" width="90" height="176" fill="url(#core)" fill-opacity=".55" class="workdash"/><circle cx="1310" cy="448" r="8" fill="#b97925"/>
  <text x="1310" y="395" text-anchor="middle" class="label working">固定核心候選</text><text x="1310" y="417" text-anchor="middle" class="tiny">安全梯／豎井</text>
  <path d="M1506 420H1582" class="workdash"/><text x="1590" y="414" class="label working">核心會占用現行廁所／戶外分界</text><text x="1590" y="437" class="small">位置與房間重排仍屬 OPEN-008／009</text>
  <path d="M1506 500H1582" class="dash"/><text x="1590" y="494" class="label deferred">L1 寬 14.0 vs 上層 13.5</text><text x="1590" y="517" class="small">需決定單側或雙側退縮 0.50 m</text>
  <path d="M1050 310H1582" class="fixeddash"/><text x="1590" y="304" class="label confirmed">池畔地坪已確認 +0.30 m</text><text x="1590" y="327" class="small">屋頂低端淨高 3.70 m；ST-01 自 +0.30 起步</text>
