  <line x1="190" y1="226" x2="190" y2="207" class="ext"/><line x1="1246" y1="226" x2="1246" y2="207" class="ext"/><line x1="1502" y1="226" x2="1502" y2="207" class="ext"/><line x1="190" y1="207" x2="1246" y2="207" class="dim"/><line x1="1246" y1="207" x2="1502" y2="207" class="dim"/><text x="718" y="200" class="dimText confirmed">33.0</text><text x="1374" y="200" class="dimText confirmed">8.0</text>

