  <text x="143" y="458" transform="rotate(-90 143 458)" text-anchor="middle" class="small confirmed">2.0 退縮／雨簾回收</text>
  <rect x="190" y="232" width="1056" height="448" fill="url(#deck)"/><rect x="1246" y="232" width="256" height="448" fill="#f7f4ed"/>
  <rect x="190" y="232" width="1312" height="448" class="wall"/><line x1="1246" y1="232" x2="1246" y2="680" class="wall"/>
