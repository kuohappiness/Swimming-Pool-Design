<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1500" viewBox="0 0 2000 1500" role="img" aria-labelledby="title desc">
  <title id="title">1F 至 3F 概念平面檢討圖 V2.2</title>
  <desc id="desc">v0.5.0 三層概念平面檢討圖。1F 顯示 33 公尺泳池主體、8 公尺機能翼、廁所、戶外區、樓梯與固定核心候選；2F 顯示 12 乘 13.5 公尺固定更衣層；3F 顯示同面積樓板繞 X35、Y6.75 順時針旋轉 26.5 度、面池鏡牆及投影外挑。非施工圖。</desc>
  <defs>
    <linearGradient id="water" x1="0" x2="1"><stop offset="0" stop-color="#d9f4fb"/><stop offset="1" stop-color="#82cfe6"/></linearGradient>
    <linearGradient id="mirror" x1="0" x2="1"><stop offset="0" stop-color="#8fcbd8"/><stop offset=".45" stop-color="#f9ffff"/><stop offset="1" stop-color="#73acbb"/></linearGradient>
    <pattern id="deck" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="16" stroke="#d8e2e7" stroke-width="2"/></pattern>
    <pattern id="outdoor" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M0 20L20 0M-5 5L5-5M15 25L25 15" stroke="#afd1bf" stroke-width="1.5"/></pattern>
    <pattern id="core" width="13" height="13" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="13" stroke="#d29946" stroke-width="2"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#263746"/></marker>
    <style>
      text{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#203241}.title{font-size:40px;font-weight:800}.subtitle{font-size:18px;fill:#607382}.panelTitle{font-size:25px;font-weight:800}.zone{font-size:20px;font-weight:750}.label{font-size:16px;font-weight:650}.small{font-size:14px;fill:#607382}.tiny{font-size:12px;fill:#6b7d89}.confirmed{fill:#237c64}.working{fill:#a66715}.deferred{fill:#b45555}.wall{fill:none;stroke:#263746;stroke-width:4;stroke-linejoin:round}.partition{fill:none;stroke:#607382;stroke-width:2.5}.glass{fill:none;stroke:#2b9fb8;stroke-width:6;stroke-linecap:round}.dash{fill:none;stroke:#b45555;stroke-width:2.5;stroke-dasharray:10 7}.workdash{fill:none;stroke:#b97925;stroke-width:2.5;stroke-dasharray:9 6}.fixeddash{fill:none;stroke:#237c64;stroke-width:2.5;stroke-dasharray:9 6}.dim{fill:none;stroke:#263746;stroke-width:1.5;marker-start:url(#arrow);marker-end:url(#arrow)}.ext{stroke:#8998a2;stroke-width:1.2}.dimText{font-size:15px;font-weight:750;text-anchor:middle}.panel{fill:#fbfcfd;stroke:#d7e0e5;stroke-width:2}.note{fill:#fffdf8;stroke:#d9cdb5;stroke-width:1.5}.titleBox{fill:#f6f9fa;stroke:#263746;stroke-width:2}
    </style>
  </defs>
  <rect width="2000" height="1500" fill="#fff"/><rect x="34" y="30" width="1932" height="1438" rx="18" fill="#fff" stroke="#d6e0e5" stroke-width="2"/>
  <text x="78" y="88" class="title">1F～3F 概念平面檢討圖</text>
  <text x="80" y="122" class="subtitle">V2.2 REVIEW · v0.5.0 · 工作支點 X=35.00 / Y=6.75 · 單位：m · 非施工圖</text>
  <g transform="translate(1745 88)"><circle r="30" fill="#eef4f6" stroke="#5d7280" stroke-width="2"/><path d="M-12 18L13-19M13-19L11-5M13-19L0-14" fill="none" stroke="#263746" stroke-width="3" stroke-linecap="round"/><text x="24" y="-27" text-anchor="middle" class="label">N</text><text x="48" y="-2" class="small">長軸 SE–NW：約 127°／307°</text><text x="48" y="19" class="tiny">本圖右向服務量體約為西北 307°</text></g>

  <!-- L1 -->
  <rect x="70" y="155" width="1860" height="520" rx="14" class="panel"/>
  <text x="96" y="193" class="panelTitle">1F｜泳池、廁所、戶外區與固定核心候選</text>
  <text x="96" y="218" class="small">33 + 8 m；右側 7 + 7 m 仍沿用手稿，因此 L1 工作總寬為 14.0 m，與 L2／L3 的 13.5 m 尚待收邊。</text>
  <!-- plan x=190 + local x*32, y=232 + local y*32 -->
