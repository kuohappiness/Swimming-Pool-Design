  <rect x="295" y="1122" width="58" height="45" fill="#f4d9ac" stroke="#b97925" stroke-width="2"/><text x="324" y="1190" text-anchor="middle" class="tiny">ST-01 到達</text>
  <rect x="395" y="930" width="90" height="165" fill="url(#core)" fill-opacity=".55" class="workdash"/><circle cx="440" cy="1012.5" r="8" fill="#b97925"/><text x="440" y="984" text-anchor="middle" class="label working">固定核心候選</text><text x="440" y="1004" text-anchor="middle" class="tiny">X=35 / Y=6.75</text>
  <text x="440" y="1250" text-anchor="middle" class="small deferred">核心、男女分區、排水豎井與 ST-01 到達仍需整合</text>
  <line x1="250" y1="790" x2="610" y2="790" class="dim"/><text x="430" y="782" class="dimText">12.0</text><line x1="630" y1="810" x2="630" y2="1215" class="dim"/><text x="655" y="1016" transform="rotate(-90 655 1016)" class="dimText">13.5</text>

